name: Codebase Maintenance Agent

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry-run (log operations but do not open actual PR)'
        type: boolean
        required: true
        default: true

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,cli,ci]"

    - name: Run Coupling & Drift Audit
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO: ${{ github.repository }}
        LLM_PROVIDER: stub
        LLM_API_KEY: temp-key
      run: |
        # Check trigger mechanism and execute broker-maintain
        if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.dry_run }}" = "false" ]; then
          echo "Executing scheduled or manual maintenance audit with LIVE PR generation..."
          broker-maintain pr . --no-dry-run
        else
          echo "Executing manual maintenance audit in DRY RUN mode..."
          broker-maintain pr .
        fi
