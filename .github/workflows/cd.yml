name: Continuous Deployment

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: osb-app-production
  ECS_CLUSTER: osb-cluster-production
  ECS_SERVICE_API: osb-service-api-production
  ECS_SERVICE_WORKER: osb-service-worker-production
  CONTAINER_NAME_API: broker-api
  CONTAINER_NAME_WORKER: broker-worker

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region $AWS_REGION || aws ecr create-repository --repository-name $ECR_REPOSITORY --region $AWS_REGION
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download and Sanitize API Task Definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.ECS_SERVICE_API }} --region ${{ env.AWS_REGION }} --query taskDefinition --output json | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > task-def-api.json
          if [ ! -s task-def-api.json ]; then echo "::error::Failed to fetch API task definition. Check permissions and name."; exit 1; fi

      - name: Download and Sanitize API Task Definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.ECS_SERVICE_API }} --region ${{ env.AWS_REGION }} --query taskDefinition --output json | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > task-def-api.json || { echo "Available task definitions:"; aws ecs list-task-definitions --region ${{ env.AWS_REGION }}; exit 1; }
          if [ ! -s task-def-api.json ]; then echo "::error::Failed to fetch API task definition. Check permissions and name."; exit 1; fi

      - name: Render API Task Definition
        id: render-api-container
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-api.json
          container-name: ${{ env.CONTAINER_NAME_API }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Render Worker Task Definition
        id: render-worker-container
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-worker.json
          container-name: ${{ env.CONTAINER_NAME_WORKER }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy API Service to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api-container.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_API }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deploy Worker Service to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-worker-container.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_WORKER }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true