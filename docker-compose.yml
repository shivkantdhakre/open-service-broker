version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # LocalStack — emulates DynamoDB and SQS for local development
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,sqs
      - DEBUG=0
      - PERSISTENCE=1
    volumes:
      - localstack-data:/var/lib/localstack

  # ---------------------------------------------------------------------------
  # Init — creates DynamoDB tables and SQS queues on startup
  # ---------------------------------------------------------------------------
  init-aws:
    image: amazon/aws-cli:2.22.0
    depends_on:
      localstack:
        condition: service_started
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting for LocalStack..."
        sleep 5

        echo "Creating DynamoDB resources table..."
        aws --endpoint-url=http://localstack:4566 --region us-east-1 \
          dynamodb create-table \
          --table-name broker-resources \
          --attribute-definitions \
            AttributeName=resource_id,AttributeType=S \
            AttributeName=resource_type,AttributeType=S \
          --key-schema \
            AttributeName=resource_id,KeyType=HASH \
            AttributeName=resource_type,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --tags Key=Project,Value=open-service-broker \
          2>/dev/null || echo "Table broker-resources already exists"

        echo "Creating DynamoDB metrics table..."
        aws --endpoint-url=http://localstack:4566 --region us-east-1 \
          dynamodb create-table \
          --table-name broker-metrics \
          --attribute-definitions \
            AttributeName=service_name,AttributeType=S \
            AttributeName=timestamp,AttributeType=S \
          --key-schema \
            AttributeName=service_name,KeyType=HASH \
            AttributeName=timestamp,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --tags Key=Project,Value=open-service-broker \
          2>/dev/null || echo "Table broker-metrics already exists"

        echo "Creating SQS task queue..."
        aws --endpoint-url=http://localstack:4566 --region us-east-1 \
          sqs create-queue \
          --queue-name broker-tasks-dlq \
          2>/dev/null || echo "DLQ already exists"

        DLQ_ARN=$$(aws --endpoint-url=http://localstack:4566 --region us-east-1 \
          sqs get-queue-attributes \
          --queue-url http://localstack:4566/000000000000/broker-tasks-dlq \
          --attribute-names QueueArn \
          --query 'Attributes.QueueArn' --output text)

        aws --endpoint-url=http://localstack:4566 --region us-east-1 \
          sqs create-queue \
          --queue-name broker-tasks \
          --attributes "{\"RedrivePolicy\":\"{\\\"deadLetterTargetArn\\\":\\\"$$DLQ_ARN\\\",\\\"maxReceiveCount\\\":\\\"3\\\"}\"}" \
          2>/dev/null || echo "Task queue already exists"

        echo "AWS resources initialized successfully!"
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1

  # ---------------------------------------------------------------------------
  # Broker API — FastAPI application gateway
  # ---------------------------------------------------------------------------
  broker-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - ENTRYPOINT_MODE=api
    depends_on:
      init-aws:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Broker Worker — SQS consumer / background task processor
  # ---------------------------------------------------------------------------
  broker-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    env_file: .env
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - ENTRYPOINT_MODE=worker
    depends_on:
      init-aws:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  localstack-data:
